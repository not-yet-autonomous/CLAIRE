name: CLAIRE Weekly Pipeline

on:
  schedule:
    - cron: '0 14 * * 0'   # Sundays at 14:00 UTC
  workflow_dispatch:         # Manual trigger for testing

concurrency:
  group: claire-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write        # Required for commit-state step

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      # ── 2. Set up Python ──────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      # ── 4. Ingest ─────────────────────────────────────────────────────────
      # Public APIs only (Reddit public JSON, HackerNews, dev.to).
      # No credentials required for current ingest implementation.
      - name: Ingest
        env:
          PYTHONUNBUFFERED: "1"
        run: python claire_ingest.py --source forum

      # ── 5. Triage ─────────────────────────────────────────────────────────
      - name: Triage
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python claire_triage.py

      # ── 6. Synthesize ─────────────────────────────────────────────────────
      - name: Synthesize
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python claire_synthesize.py

      # ── 7. Generate PDF digest ────────────────────────────────────────────
      - name: Generate PDF digest
        id: generate_pdf
        run: |
          output=$(python claire_output.py --format pdf)
          # claire_output.py prints "digest_date=YYYY-MM-DD" to stdout
          echo "$output" | grep "^digest_date=" >> "$GITHUB_OUTPUT"

      # ── 8. CLAIRE-A assembler ─────────────────────────────────────────────
      - name: CLAIRE-A assembler
        run: python claire_a_assembler.py

      # ── 9. CLAIRE-A runner (Opus) ─────────────────────────────────────────
      - name: CLAIRE-A runner
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python claire_a_runner.py

      # ── 10. CLAIRE-A scorer (Sonnet) ──────────────────────────────────────
      - name: CLAIRE-A scorer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python claire_a_scorer.py --notes data/session_notes.txt

      # ── 11. Commit pipeline state back to repo ────────────────────────────
      - name: Commit pipeline state
        run: |
          git config user.name  "CLAIRE Pipeline"
          git config user.email "claire-pipeline@users.noreply.github.com"
          git add data/ output/ logs/ change_log.json friction_log.txt
          git diff --cached --quiet || git commit \
            -m "CLAIRE auto: cycle run $(date -u '+%Y-%m-%d')"
          git push

      # ── 12. Pushover notification ─────────────────────────────────────────
      - name: Notify
        if: always()
        env:
          DIGEST_DATE:        ${{ steps.generate_pdf.outputs.digest_date }}
          PUSHOVER_APP_TOKEN: ${{ secrets.PUSHOVER_APP_TOKEN }}
          PUSHOVER_USER_KEY:  ${{ secrets.PUSHOVER_USER_KEY }}
          GITHUB_SHA:         ${{ github.sha }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
          GITHUB_SERVER_URL:  ${{ github.server_url }}
        run: python claire_notify.py
