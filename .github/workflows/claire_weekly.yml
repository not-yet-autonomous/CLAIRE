name: CLAIRE Weekly Pipeline

on:
  schedule:
    - cron: '0 14 * * 0'  # Sunday 14:00 UTC
  workflow_dispatch:       # Manual trigger for testing

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Ingest HackerNews and dev.to
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python claire_ingest.py --source gha

      - name: Write profile snapshot placeholder
        run: |
          if [ ! -f data/profile_snapshot.txt ]; then
            echo "# Profile snapshot placeholder — GHA environment" > data/profile_snapshot.txt
            echo "# Live profile_snapshot.txt is gitignored and maintained locally." >> data/profile_snapshot.txt
            echo "# Cross-reference gate running without profile context this run." >> data/profile_snapshot.txt
            echo "# Update data/profile_snapshot.txt locally and push to include profile context." >> data/profile_snapshot.txt
          fi

      - name: Triage
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python claire_triage.py

      - name: Synthesize
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python claire_synthesize.py

      - name: Run CLAIRE-A
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python claire_a_assembler.py
          python claire_a_runner.py
          python claire_a_scorer.py --notes data/session_notes.txt

      - name: Official-signal lane
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python claire_official_signal.py || true

      - name: Generate digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python claire_output.py

      - name: Commit outputs
        run: |
          git config user.name "CLAIRE"
          git config user.email "claire@noreply"
          git add -f output/claire_digest_*.pdf || true
          git add -f output/claire_techniques_*.pdf || true
          # CLAIRE-A state files — enumerated explicitly. Do NOT widen to a
          # blanket "git add -f data/": scraped content (raw_posts.json and
          # derivatives) must not be republished to this public repo.
          git add -f data/claire_a_decisions_*.json || true
          git add -f data/claire_a_session_history.json || true
          git add -f data/claire_a_source_reliability.json || true
          git add -f data/cost_log.json || true
          git add -f data/suppressed_candidates_*.json || true
          git add -f data/cycle_state.json || true
          git add -f data/official_signal_seen.json || true
          git add -f logs/ || true
          git diff --staged --quiet || git commit -m "CLAIRE digest $(date -u +%Y-%m-%d)"
          git push

      - name: Notify via Pushover
        run: |
          PDF=$(ls output/claire_digest_*.pdf 2>/dev/null | sort | tail -1)
          if [ -z "$PDF" ]; then
            echo "No digest PDF found -- skipping notification"
            exit 0
          fi
          curl -s -o /dev/null -w "%{http_code}" \
            --form-string "token=${{ secrets.PUSHOVER_APP_TOKEN }}" \
            --form-string "user=${{ secrets.PUSHOVER_USER_KEY }}" \
            --form-string "message=CLAIRE digest ready -- $(date -u +%Y-%m-%d)" \
            --form-string "title=CLAIRE" \
            --form "attachment=@$PDF;type=application/pdf" \
            https://api.pushover.net/1/messages.json

      - name: Add workflow to git if new
        run: |
          git add .github/
          git diff --staged --quiet || git commit -m "GHA: add claire_weekly workflow"
          git push


