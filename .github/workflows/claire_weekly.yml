name: CLAIRE Weekly Pipeline

on:
  schedule:
    - cron: '0 14 * * 0'  # Sunday 14:00 UTC
  workflow_dispatch:       # Manual trigger for testing

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Ingest HackerNews and dev.to
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python claire_ingest.py --source gha

      - name: Triage
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python claire_triage.py

      - name: Synthesize
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python claire_synthesize.py

      - name: Run CLAIRE-A
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python claire_a_assembler.py
          python claire_a_runner.py
          python claire_a_scorer.py --notes data/session_notes.txt

      - name: Generate digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python claire_output.py

      - name: Commit outputs
        run: |
          git config user.name "CLAIRE"
          git config user.email "claire@noreply"
          git add -f output/claire_digest_*.pdf || true
          git add -f output/claire_techniques_*.pdf || true
          git diff --staged --quiet || git commit -m "CLAIRE digest $(date -u +%Y-%m-%d)"
          git push

      - name: Notify via Pushover
        run: |
          PDF=$(ls output/claire_digest_*.pdf 2>/dev/null | sort | tail -1)
          if [ -z "$PDF" ]; then
            echo "No digest PDF found -- skipping notification"
            exit 0
          fi
          curl -s -o /dev/null -w "%{http_code}" \
            --form-string "token=${{ secrets.PUSHOVER_APP_TOKEN }}" \
            --form-string "user=${{ secrets.PUSHOVER_USER_KEY }}" \
            --form-string "message=CLAIRE digest ready -- $(date -u +%Y-%m-%d)" \
            --form-string "title=CLAIRE" \
            --form "attachment=@$PDF;type=application/pdf" \
            https://api.pushover.net/1/messages.json

      - name: Email digest
        run: |
          if [ -z "${{ secrets.EMAIL_FROM }}" ]; then
            echo "Email secrets not configured -- skipping"
            exit 0
          fi
          PDF=$(ls output/claire_digest_*.pdf 2>/dev/null | sort | tail -1)
          if [ -z "$PDF" ]; then
            echo "No digest PDF found -- skipping email"
            exit 0
          fi
          FILENAME=$(basename "$PDF")
          ENCODED=$(base64 -w 0 "$PDF")
          BOUNDARY="CLAIRE_BOUNDARY_$(date +%s)"
          {
            echo "From: ${{ secrets.EMAIL_FROM }}"
            echo "To: ${{ secrets.EMAIL_TO }}"
            echo "Subject: CLAIRE Digest $(date -u +%Y-%m-%d)"
            echo "MIME-Version: 1.0"
            echo "Content-Type: multipart/mixed; boundary=\"$BOUNDARY\""
            echo ""
            echo "--$BOUNDARY"
            echo "Content-Type: text/plain"
            echo ""
            echo "CLAIRE weekly digest attached."
            echo ""
            echo "--$BOUNDARY"
            echo "Content-Type: application/pdf"
            echo "Content-Transfer-Encoding: base64"
            echo "Content-Disposition: attachment; filename=\"$FILENAME\""
            echo ""
            echo "$ENCODED"
            echo "--$BOUNDARY--"
          } | curl -s --url "smtps://smtp-mail.outlook.com:465" \
            --ssl-reqd \
            --mail-from "${{ secrets.EMAIL_FROM }}" \
            --mail-rcpt "${{ secrets.EMAIL_TO }}" \
            --user "${{ secrets.EMAIL_FROM }}:${{ secrets.EMAIL_PASSWORD }}" \
            --upload-file - \
            || echo "Email send failed -- non-fatal"

      - name: Add workflow to git if new
        run: |
          git add .github/
          git diff --staged --quiet || git commit -m "GHA: add claire_weekly workflow"
          git push


